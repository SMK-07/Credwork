services:
  - type: web
    name: wvte-backend
    env: node
    buildCommand: cd backend && npm install && npx sequelize-cli db:migrate
    startCommand: cd backend && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wvte-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
  - type: web
    name: wvte-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: wvte-backend
          type: web
          property: host

databases:
  - name: wvte-db
    databaseName: wvte
    user: wvte_user
